spring:
  application:
    name: notification-api
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1
  error:
    include-message: always

notification:
  api:
    key: ${NOTIFICATION_API_KEY:change-me-in-prod}
  service:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8081}
  timeout:
    ms: ${NOTIFICATION_TIMEOUT_MS:5000}

feign:
  client:
    config:
      notification-service:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: basic
  compression:
    request:
      enabled: true

logging:
  level:
    root: INFO
    whatsapp_platform.notification_api: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
